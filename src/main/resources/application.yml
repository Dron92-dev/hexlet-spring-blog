spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  output:
      ansi:
        enabled: always
  h2:
    console:
      enabled: true

logging:
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss

app:
  welcome-message: "Welcome to Spring blog!"
  admin-email: "admin@test.com"
  page-size: 10